<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FAF8F3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Cellar Book</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#FAF8F3;        /* warm paper */
  --card:#FFFFFF;
  --ink:#2B2623;          /* warm charcoal */
  --muted:#8A8177;
  --line:#E7E1D4;
  --line-strong:#D8D0BE;
  --wine:#6E1E2B;         /* deep burgundy */
  --wine-deep:#4A1420;
  --wine-tint:#F4E9EA;
  --vine:#5A6B4D;         /* vineyard green */
  --vine-tint:#EDF0E7;
  --ochre:#B9862F;        /* gold ochre */
  --ochre-tint:#F6EEDD;
  --slate:#7C8698;
  --display:'Fraunces', Georgia, 'Times New Roman', serif;
  --body:-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--body);
  font-size:15px;
  line-height:1.45;
  overscroll-behavior-y:none;
}
button{font-family:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:16px}

/* ---------- shell ---------- */
#app{display:flex;flex-direction:column;height:100dvh}
header.topbar{
  padding:calc(env(safe-area-inset-top) + 16px) 18px 12px;
  display:flex;align-items:baseline;justify-content:space-between;
  background:var(--paper);
  border-bottom:3px double var(--line-strong);
}
.brand{font-family:var(--display);font-size:27px;font-weight:700;letter-spacing:.01em;color:var(--wine)}
.icon-btn{color:var(--muted);font-size:12px;letter-spacing:.15em;text-transform:uppercase;padding:6px 2px;font-weight:600}
.icon-btn:active{color:var(--wine)}
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px 112px}

.eyebrow{font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--wine);font-weight:700}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin:6px 2px 12px}
.section-head .count{color:var(--muted);font-size:12px}

/* ---------- cards ---------- */
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:14px;
  padding:14px 14px 12px;
  margin-bottom:12px;
  box-shadow:0 1px 3px rgba(43,38,35,.05);
}
.card-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.wine-name{font-family:var(--display);font-size:20px;font-weight:600;line-height:1.18;color:var(--ink)}
.wine-sub{color:var(--muted);font-size:12.5px;margin-top:3px}
.type-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:1px}
.t-Red{background:#8E2F3E}.t-White{background:#C9B458}.t-Rosé{background:#DB9AA2}
.t-Sparkling{background:#C9A227}.t-Dessert{background:#B06E2E}.t-Fortified{background:#7A4A22}

.right-col{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.qty-pill{
  text-align:center;min-width:52px;
  border:1px solid var(--line);border-radius:10px;padding:5px 8px;background:var(--paper);
}
.qty-pill b{font-family:var(--display);font-size:20px;color:var(--ink)}
.qty-pill span{display:block;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.score-badge{
  display:inline-flex;align-items:baseline;gap:3px;
  background:var(--wine);color:#FBF6EF;border-radius:999px;padding:3px 10px 4px;
}
.score-badge b{font-family:var(--display);font-size:16px;font-weight:700;line-height:1}
.score-badge span{font-size:9px;letter-spacing:.14em;text-transform:uppercase;opacity:.85}

.thumb{
  width:54px;height:54px;object-fit:cover;border-radius:10px;
  border:1px solid var(--line-strong);flex-shrink:0;
}
.card-body{display:flex;gap:12px;align-items:flex-start}
.card-body > div:first-child{flex:1;min-width:0}

.card-meta{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:10px;font-size:12px;color:var(--muted)}
.card-meta b{color:var(--ink);font-weight:600}

/* signature: drink-window gauge */
.gauge{margin-top:12px}
.gauge-track{position:relative;height:6px;border-radius:3px;background:#F0EBE0;border:1px solid var(--line);overflow:visible}
.gauge-fill{position:absolute;top:0;bottom:0;border-radius:3px}
.g-hold .gauge-fill{background:var(--slate)}
.g-window .gauge-fill{background:var(--vine)}
.g-soon .gauge-fill{background:var(--ochre)}
.g-past .gauge-fill{background:var(--wine)}
.gauge-now{
  position:absolute;top:-4px;width:2px;height:14px;background:var(--ink);
  border-radius:1px;box-shadow:0 0 0 1.5px var(--card);
}
.gauge-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:5px;letter-spacing:.05em}
.gauge-status{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-top:6px}
.s-hold{color:var(--slate)}.s-window{color:var(--vine)}.s-soon{color:var(--ochre)}.s-past{color:var(--wine)}

.card-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;border-top:1px solid var(--line);padding-top:10px}
.log-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.log-row:last-child{border-bottom:none}
.log-main{flex:1;font-size:13.5px}
.log-main b{font-weight:600}
.log-sub{font-size:11px;color:var(--muted);margin-top:1px}
.log-del{color:var(--wine);font-size:15px;padding:6px 10px;font-weight:700}
.chip-btn{
  font-size:12.5px;font-weight:600;padding:7px 13px;border:1px solid var(--line-strong);
  border-radius:999px;color:var(--ink);background:var(--paper);
}
.chip-btn:active{border-color:var(--wine);color:var(--wine)}
.chip-btn.wine{background:var(--wine);border-color:var(--wine);color:#FBF6EF}

/* ---------- filters / search ---------- */
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row input{
  flex:1;background:var(--card);border:1px solid var(--line-strong);border-radius:12px;
  padding:11px 13px;color:var(--ink);outline:none;
}
.search-row input::placeholder{color:#B4AB9E}
.search-row input:focus{border-color:var(--wine)}
.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter{
  font-size:12.5px;font-weight:600;white-space:nowrap;padding:7px 14px;border-radius:999px;
  border:1px solid var(--line-strong);color:var(--muted);background:var(--card);
}
.filter.active{border-color:var(--wine);color:#FBF6EF;background:var(--wine)}
.sort-select{background:var(--card);border:1px solid var(--line-strong);border-radius:12px;padding:0 10px;color:var(--ink);font-size:13px;outline:none;max-width:132px}

/* ---------- tastings ---------- */
.tasting-card{border-left:3px solid var(--ochre)}
.score-badge.ochre{background:var(--ochre)}
.tasting-notes{margin-top:8px;font-size:13.5px;color:#5C544B;white-space:pre-wrap}
.tasting-date{font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

/* ---------- alerts ---------- */
.alert-group{margin-bottom:22px}
.alert-band{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.alert-band .rule{flex:1;height:1px;background:var(--line-strong)}
.alert-band .eyebrow{color:var(--ink)}

/* ---------- stats ---------- */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.stat-tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 1px 3px rgba(43,38,35,.05)}
.stat-tile .v{font-family:var(--display);font-size:27px;font-weight:700;color:var(--wine);line-height:1.1}
.stat-tile .l{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:4px;font-weight:600}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-row .bl{width:76px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.bar-row .bt{flex:1;height:16px;background:var(--paper);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.bar-row .bf{height:100%;background:linear-gradient(90deg,var(--wine-deep),var(--wine))}
.bar-row .bv{width:30px;font-size:12px;color:var(--ink);font-weight:600}
.panel-block{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 1px 3px rgba(43,38,35,.05)}
.panel-block h3{font-family:var(--display);font-size:18px;font-weight:600;margin-bottom:12px;color:var(--wine-deep)}
.plain-row{display:flex;justify-content:space-between;gap:12px;font-size:13px;padding:7px 0;border-bottom:1px solid var(--line)}
.plain-row:last-child{border-bottom:none}
.plain-row span:last-child{color:var(--wine);font-weight:600;text-align:right}

/* ---------- empty states ---------- */
.empty{text-align:center;padding:56px 24px;color:var(--muted)}
.empty .glyph{font-family:var(--display);font-size:44px;color:var(--wine);opacity:.55;line-height:1}
.empty p{margin-top:10px;font-size:13.5px}
.empty .chip-btn{margin-top:16px;display:inline-block}

/* ---------- bottom nav ---------- */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;
  display:flex;background:rgba(250,248,243,.96);backdrop-filter:blur(10px);
  border-top:1px solid var(--line-strong);
  padding:9px 6px calc(env(safe-area-inset-bottom) + 9px);
}
.tab{flex:1;text-align:center;color:var(--muted);font-size:10px;letter-spacing:.12em;text-transform:uppercase;position:relative;padding-top:3px;font-weight:600}
.tab .glyph{display:block;font-family:var(--display);font-size:19px;line-height:1.2;margin-bottom:1px;font-weight:600}
.tab.active{color:var(--wine)}
.badge{
  position:absolute;top:-3px;right:calc(50% - 22px);
  background:var(--wine);color:#FBF6EF;font-size:9.5px;font-weight:700;
  min-width:16px;height:16px;border-radius:8px;line-height:16px;padding:0 4px;letter-spacing:0;
}

/* ---------- fast-scroll handle ---------- */
.fs{
  position:fixed;right:0;width:26px;z-index:30;
  top:calc(env(safe-area-inset-top) + 78px);
  bottom:calc(env(safe-area-inset-bottom) + 78px);
  opacity:0;pointer-events:none;transition:opacity .25s;
  touch-action:none;
}
.fs.on{opacity:1;pointer-events:auto}
.fs.hidden{display:none}
.fs-thumb{
  position:absolute;right:3px;width:5px;border-radius:3px;
  background:rgba(110,30,43,.45);
  transition:width .12s, background .12s;
}
.fs.drag .fs-thumb{width:9px;background:rgba(110,30,43,.75)}

/* ---------- FAB ---------- */
.fab{
  position:fixed;right:18px;bottom:calc(env(safe-area-inset-bottom) + 78px);
  width:54px;height:54px;border-radius:50%;
  background:var(--wine);color:#FBF6EF;font-size:28px;line-height:0;
  box-shadow:0 6px 16px rgba(74,20,32,.35);
  display:flex;align-items:center;justify-content:center;
}
.fab:active{transform:scale(.94)}

/* ---------- sheet / modal ---------- */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(43,38,35,.42);z-index:40;
  opacity:0;pointer-events:none;transition:opacity .18s;
}
.sheet-backdrop.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:var(--paper);border-radius:20px 20px 0 0;border-top:1px solid var(--line-strong);
  max-height:90dvh;overflow-y:auto;
  transform:translateY(102%);transition:transform .22s ease-out;
  padding:10px 18px calc(env(safe-area-inset-bottom) + 20px);
}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:38px;height:4px;border-radius:2px;background:var(--line-strong);margin:4px auto 14px}
.sheet h2{font-family:var(--display);font-size:23px;font-weight:700;margin-bottom:14px;color:var(--wine-deep)}
.f-row{margin-bottom:12px}
.f-row label{display:block;font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;font-weight:700}
.f-row input,.f-row select,.f-row textarea{
  width:100%;background:var(--card);border:1px solid var(--line-strong);border-radius:11px;
  padding:11px 12px;color:var(--ink);outline:none;appearance:none;
}
.f-row textarea{min-height:88px;resize:vertical}
.f-row input:focus,.f-row select:focus,.f-row textarea:focus{border-color:var(--wine)}
.f-split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.primary-btn{
  width:100%;background:var(--wine);color:#FBF6EF;font-weight:700;font-size:15px;
  border-radius:12px;padding:14px;margin-top:6px;letter-spacing:.04em;
}
.primary-btn:active{background:var(--wine-deep)}
.danger-link{width:100%;text-align:center;color:var(--wine);font-size:13px;padding:14px 0 4px;font-weight:600}
.settings-btn{
  width:100%;text-align:left;background:var(--card);border:1px solid var(--line-strong);border-radius:11px;
  padding:13px 14px;margin-bottom:10px;font-size:14px;color:var(--ink);font-weight:600;
}
.settings-btn small{display:block;color:var(--muted);font-size:11.5px;margin-top:2px;font-weight:400}

/* structured tasting */
details.sat{margin:2px 0 12px;border:1px solid var(--line-strong);border-radius:11px;background:var(--card);overflow:hidden}
details.sat summary{list-style:none;cursor:pointer;padding:12px 14px;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--wine);display:flex;justify-content:space-between;align-items:center}
details.sat summary::-webkit-details-marker{display:none}
details.sat summary:after{content:'+';font-size:16px;color:var(--muted);font-weight:400}
details.sat[open] summary:after{content:'−'}
.sat-body{padding:0 12px 12px;border-top:1px solid var(--line)}
.sat-h{font-family:var(--display);font-size:14.5px;font-weight:700;color:var(--wine-deep);margin:14px 0 0}
.sat-row{margin:10px 0 2px}
.sat-label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:6px}
.sat-opts{display:flex;flex-wrap:wrap;gap:6px}
.sat-pill{font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;border:1px solid var(--line-strong);background:var(--paper);color:var(--ink)}
.sat-pill.on{background:var(--wine);border-color:var(--wine);color:#FBF6EF}
.sat-summary{margin-top:8px;font-size:12px;color:#5C544B;border-top:1px dashed var(--line);padding-top:8px;line-height:1.7}
.sat-summary b{color:var(--wine);letter-spacing:.04em}
details.tier{border:1px solid var(--line);border-radius:9px;margin:10px 0;background:var(--paper)}
details.tier summary{list-style:none;cursor:pointer;padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);display:flex;justify-content:space-between;align-items:center;gap:8px}
details.tier summary::-webkit-details-marker{display:none}
details.tier summary:after{content:'+';font-size:14px;color:var(--muted);font-weight:400}
details.tier[open] summary:after{content:'−'}
.tier-cap{font-weight:400;letter-spacing:.02em;text-transform:none;font-style:italic;color:var(--muted);font-size:11px;flex:1;text-align:right}
.tier-body{padding:0 10px 10px}

/* photo box + scan */
.photo-box{
  border:1.5px dashed var(--line-strong);border-radius:12px;background:var(--card);
  padding:14px;text-align:center;color:var(--muted);font-size:13px;font-weight:600;
}
.photo-box:active{border-color:var(--wine);color:var(--wine)}
.photo-preview{display:flex;gap:12px;align-items:center}
.photo-preview img{width:70px;height:70px;object-fit:cover;border-radius:10px;border:1px solid var(--line-strong)}
.photo-preview .col{flex:1;text-align:left}
.scan-status{font-size:12px;color:var(--vine);margin-top:6px;font-weight:600;min-height:16px}
.scan-status.err{color:var(--wine)}
.mini-btn{
  font-size:12px;font-weight:700;color:var(--wine);border:1px solid var(--wine);
  border-radius:999px;padding:6px 12px;background:var(--wine-tint);
}
.mini-btn.quiet{color:var(--muted);border-color:var(--line-strong);background:var(--paper)}

/* lightbox */
.lightbox{
  position:fixed;inset:0;z-index:60;background:rgba(20,12,10,.9);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.lightbox img{max-width:100%;max-height:100%;border-radius:12px}

@media (prefers-reduced-motion: reduce){
  .sheet,.sheet-backdrop{transition:none}
}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">Cellar Book</div>
    <button class="icon-btn" onclick="openSettings()">Settings</button>
  </header>

  <main id="main"></main>

  <button class="fab" id="fab" onclick="fabAction()" aria-label="Add">+</button>

  <div class="fs hidden" id="fastscroll" aria-hidden="true"><div class="fs-thumb" id="fsthumb"></div></div>

  <nav class="tabs">
    <button class="tab" data-tab="cellar" onclick="setTab('cellar')"><span class="glyph">◈</span>Cellar</button>
    <button class="tab" data-tab="tastings" onclick="setTab('tastings')"><span class="glyph">✎</span>Tastings</button>
    <button class="tab" data-tab="alerts" onclick="setTab('alerts')"><span class="glyph">⌛</span>Alerts<span class="badge" id="alertBadge" style="display:none"></span></button>
    <button class="tab" data-tab="stats" onclick="setTab('stats')"><span class="glyph">№</span>Stats</button>
  </nav>
</div>

<div class="sheet-backdrop" id="backdrop" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div id="lightbox-root"></div>

<script>
/* ================= storage (IndexedDB, migrates from old localStorage) ================= */
const LS_KEY='cellarbook-v1';
let state = { wines:[], tastings:[] };
let ui = { tab:'cellar', search:'', filter:'All', tSearch:'', tFilterWine:null, photo:null, sort:'recent' };

function idbOpen(){
  return new Promise((res,rej)=>{
    const r = indexedDB.open('cellarbook', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('kv');
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(k){
  const db = await idbOpen();
  return new Promise((res,rej)=>{
    const t = db.transaction('kv').objectStore('kv').get(k);
    t.onsuccess = () => res(t.result); t.onerror = () => rej(t.error);
  });
}
async function idbSet(k,v){
  const db = await idbOpen();
  return new Promise((res,rej)=>{
    const t = db.transaction('kv','readwrite').objectStore('kv').put(v,k);
    t.onsuccess = () => res(); t.onerror = () => rej(t.error);
  });
}
function save(){ idbSet('state', state).catch(()=>{ try{localStorage.setItem(LS_KEY, JSON.stringify(state));}catch(e){} }); }

function migrate(){
  let dirty = false;
  if(!Array.isArray(state.consumed)){ state.consumed = []; dirty = true; }
  if(!state.rating100){
    state.tastings.forEach(t=>{ if(+t.rating>0 && +t.rating<=5) t.rating = +t.rating*20; });
    state.rating100 = true; dirty = true;
  }
  if(dirty) save();
}

async function boot(){
  try{
    const s = await idbGet('state');
    if(s && Array.isArray(s.wines)) state = s;
    else{
      const old = localStorage.getItem(LS_KEY);          // migrate v1 data
      if(old){ state = JSON.parse(old); save(); }
    }
  }catch(e){
    try{ const old = localStorage.getItem(LS_KEY); if(old) state = JSON.parse(old); }catch(_){}
  }
  migrate();
  render();
}

const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const YEAR = new Date().getFullYear();
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const rand = n => 'R '+Number(n).toLocaleString('en-ZA',{maximumFractionDigits:0});
const normVintage = s => {
  s = String(s||'').trim();
  return /^(n\.?\s?v\.?|non[\s-]?vintage)$/i.test(s) ? 'NV' : s;
};
const sameWine = (a,b) =>
  (a?.name||'').trim().toLowerCase() === (b?.name||'').trim().toLowerCase() &&
  String(a?.vintage||'').trim() === String(b?.vintage||'').trim();

/* ================= drink-window logic ================= */
function windowStatus(w){
  const from = parseInt(w.drinkFrom)||null, to = parseInt(w.drinkTo)||null;
  if(!from && !to) return null;
  const f = from||to, t = to||from;
  if(YEAR > t) return {key:'past', label:'Past window'};
  if(t - YEAR <= 1) return {key:'soon', label:'Drink soon'};
  if(YEAR >= f) return {key:'window', label:'In window'};
  return {key:'hold', label:'Hold · from '+f};
}
function gaugeHTML(w){
  const st = windowStatus(w);
  if(!st) return '';
  const from = parseInt(w.drinkFrom)||parseInt(w.drinkTo);
  const to   = parseInt(w.drinkTo)||parseInt(w.drinkFrom);
  const span = Math.max(to-from,1);
  const pos  = Math.min(Math.max((YEAR-from)/span,0),1)*100;
  return `
    <div class="gauge g-${st.key}">
      <div class="gauge-track">
        <div class="gauge-fill" style="left:0;width:${pos}%"></div>
        <div class="gauge-now" style="left:calc(${pos}% - 1px)"></div>
      </div>
      <div class="gauge-labels"><span>${from}</span><span>${to}</span></div>
      <div class="gauge-status s-${st.key}">${st.label}</div>
    </div>`;
}
function alertWines(){
  const list = state.wines.filter(w=>(w.qty||0)>0);
  return {
    past: list.filter(w=>windowStatus(w)?.key==='past'),
    soon: list.filter(w=>windowStatus(w)?.key==='soon')
  };
}

/* ================= tabs & render ================= */
/* ---- hardware back button: step back through the app, not out of it ---- */
let navArmed = false, navCleanup = false;
function armBack(){ if(!navArmed){ try{ history.pushState({cb:1},''); navArmed = true; }catch(e){} } }
function atRoot(){
  return !document.querySelector('.lightbox')
    && !document.getElementById('sheet').classList.contains('open')
    && ui.tab === 'cellar';
}
function maybeDisarm(){
  if(navArmed && atRoot()){ navCleanup = true; history.back(); }
}
window.addEventListener('popstate', () => {
  navArmed = false;
  if(navCleanup){
    // a housekeeping pop we triggered ourselves — never touch the UI,
    // but re-arm if a new layer opened while the pop was in flight
    navCleanup = false;
    if(!atRoot()) armBack();
    return;
  }
  const lb = document.querySelector('.lightbox');
  if(lb) lb.remove();
  else if(document.getElementById('sheet').classList.contains('open')) closeSheet();
  else if(ui.tab !== 'cellar'){ ui.tab = 'cellar'; render(); }
  if(!atRoot()) armBack();
});
function setTab(t){
  if(t === 'tastings') ui.tFilterWine = null;   // tapping the tab shows the full journal
  ui.tab = t; render();
  t === 'cellar' ? maybeDisarm() : armBack();
}
function render(){
  const act = document.activeElement;
  const keepFocus = (act && (act.id==='cellar-search' || act.id==='tastings-search'))
    ? { id: act.id, pos: act.selectionStart } : null;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===ui.tab));
  const a = alertWines(), n = a.past.length+a.soon.length;
  const badge = document.getElementById('alertBadge');
  badge.style.display = n? 'block':'none'; badge.textContent = n;
  document.getElementById('fab').style.display = (ui.tab==='cellar'||ui.tab==='tastings')?'flex':'none';
  const m = document.getElementById('main');
  if(ui.tab==='cellar')   m.innerHTML = viewCellar();
  if(ui.tab==='tastings') m.innerHTML = viewTastings();
  if(ui.tab==='alerts')   m.innerHTML = viewAlerts();
  if(ui.tab==='stats')    m.innerHTML = viewStats();
  if(keepFocus){
    const el = document.getElementById(keepFocus.id);
    if(el){
      el.focus();
      const p = keepFocus.pos ?? el.value.length;
      try{ el.setSelectionRange(p, p); }catch(e){}
    }
  }
  requestAnimationFrame(fsUpdate);
}
function fabAction(){ ui.tab==='tastings' ? openTastingForm() : openWineForm(); }

/* ================= cellar view ================= */
const TYPES=['Red','White','Rosé','Sparkling','Dessert','Fortified'];
function viewCellar(){
  const q = ui.search.toLowerCase();
  const windowEnd = w => parseInt(w.drinkTo)||parseInt(w.drinkFrom)||9999;
  const sorts = {
    recent:(a,b)=>(b.created||0)-(a.created||0),
    window:(a,b)=>windowEnd(a)-windowEnd(b),
    score:(a,b)=>(+b.score||0)-(+a.score||0),
    vintage:(a,b)=>(parseInt(a.vintage)||9999)-(parseInt(b.vintage)||9999),
    name:(a,b)=>(a.name||'').localeCompare(b.name||'')
  };
  let list = state.wines.slice().sort(sorts[ui.sort]||sorts.recent);
  if(ui.filter!=='All') list = list.filter(w=>w.type===ui.filter);
  if(q) list = list.filter(w=>[w.name,w.producer,w.region,w.country,w.varietal,w.vintage].join(' ').toLowerCase().includes(q));
  const bottles = state.wines.reduce((s,w)=>s+(+w.qty||0),0);
  let html = `
    <div class="search-row">
      <input id="cellar-search" placeholder="Search the cellar…" value="${esc(ui.search)}" oninput="ui.search=this.value;debouncedRender()">
      <select class="sort-select" onchange="ui.sort=this.value;render()">
        <option value="recent" ${ui.sort==='recent'?'selected':''}>Newest</option>
        <option value="window" ${ui.sort==='window'?'selected':''}>Drink-by</option>
        <option value="score" ${ui.sort==='score'?'selected':''}>Score</option>
        <option value="vintage" ${ui.sort==='vintage'?'selected':''}>Vintage</option>
        <option value="name" ${ui.sort==='name'?'selected':''}>A–Z</option>
      </select>
    </div>
    <div class="filters">${['All',...TYPES].map(t=>
      `<button class="filter ${ui.filter===t?'active':''}" onclick="ui.filter='${t}';render()">${t}</button>`).join('')}
    </div>
    <div class="section-head"><span class="eyebrow">In the cellar</span><span class="count">${bottles} bottle${bottles===1?'':'s'}</span></div>`;
  if(!state.wines.length) return html + emptyState('◈','Your cellar is empty.<br>Add your first bottle to start the book.','Add a bottle','openWineForm()');
  if(!list.length) return html + emptyState('◈','No wines match this search.');
  return html + list.map(cardHTML).join('');
}

function cardHTML(w){
  const meta=[];
  if(w.varietal) meta.push(`<span><b>${esc(w.varietal)}</b></span>`);
  if(w.region)   meta.push(`<span>${esc(w.region)}</span>`);
  if(w.country)  meta.push(`<span>${esc(w.country)}</span>`);
  if(w.location) meta.push(`<span>Bin <b>${esc(w.location)}</b></span>`);
  if(w.price)    meta.push(`<span><b>${rand(w.price)}</b>/btl</span>`);
  if(w.format && w.format!=='750ml') meta.push(`<span><b>${esc(w.format)}</b></span>`);
  if(w.purchaseDate) meta.push(`<span>Bought ${fmtMonth(w.purchaseDate)}</span>`);
  const score = (+w.score>0)? `<div class="score-badge"><b>${w.score}</b><span>pts</span></div>` : '';
  const noteCount = state.tastings.filter(t=>sameWine(t, w)).length;
  return `
  <div class="card">
    <div class="card-body">
      ${w.photo?`<img class="thumb" src="${w.photo}" onclick="lightbox('${w.id}','wines')" alt="Label">`:''}
      <div>
        <div class="wine-name">${esc(w.name)}</div>
        <div class="wine-sub"><span class="type-dot t-${w.type}"></span>${esc(w.producer||'')}${w.producer&&w.vintage?' · ':''}${esc(w.vintage||'')}</div>
      </div>
      <div class="right-col">
        <div class="qty-pill"><b>${w.qty||0}</b><span>btls</span></div>
        ${score}
      </div>
    </div>
    ${meta.length?`<div class="card-meta">${meta.join('')}</div>`:''}
    ${gaugeHTML(w)}
    <div class="card-actions">
      <button class="chip-btn wine" onclick="drinkOne('${w.id}')">Open a bottle</button>
      <button class="chip-btn" onclick="openWineForm('${w.id}')">Edit</button>
      <button class="chip-btn" onclick="adjustQty('${w.id}',1)">+1</button>
      ${noteCount?`<button class="chip-btn" onclick="showTastingsFor('${w.id}')">Notes (${noteCount})</button>`:''}
    </div>
  </div>`;
}
function showTastingsFor(id){
  const w = state.wines.find(x=>x.id===id); if(!w) return;
  ui.tFilterWine = { name: w.name, vintage: w.vintage||'' };
  ui.tSearch = '';
  ui.tab = 'tastings'; render(); armBack();
}
function clearTastingFilter(){ ui.tFilterWine = null; render(); }
function adjustQty(id,d){
  const w = state.wines.find(x=>x.id===id); if(!w) return;
  w.qty = Math.max(0,(+w.qty||0)+d); save(); render();
}
function drinkOne(id){
  const w = state.wines.find(x=>x.id===id); if(!w) return;
  if((+w.qty||0) <= 0){ openTastingForm(null, w, null); return; }
  w.qty = +w.qty - 1;
  const cid = uid();
  state.consumed.push({ id:cid, wineId:w.id, name:w.name, vintage:w.vintage||'',
    type:w.type||'', price:+w.price||0, date:new Date().toISOString().slice(0,10) });
  const last = +w.qty === 0;
  if(last) state.wines = state.wines.filter(x=>x.id!==w.id);   // empty bottles leave the cellar
  save();
  render();                                                    // count updates on screen immediately
  ui.lastOpenedWine = w;
  ui.lastOpenedInfo = { left:+w.qty, wineId:w.id, consumedId:cid, last };
  const hasNote = state.tastings.some(t=>sameWine(t, w));
  hasNote ? openOpenedSheet() : openTastingForm(null, w, ui.lastOpenedInfo);
}
function openedHeadHTML(info){
  const msg = info.last
    ? 'That was the last bottle — removed from the cellar.'
    : info.left+' left in the cellar — add a note, or close to skip.';
  return `<h2>Bottle opened ✓</h2>
    <div style="display:flex;align-items:center;gap:10px;margin:-8px 0 14px">
      <p style="flex:1;font-size:12.5px;color:var(--muted);font-weight:600">${msg}</p>
      <button class="mini-btn quiet" onclick="undoOpen()">Undo</button>
    </div>`;
}
function openOpenedSheet(){
  const w = ui.lastOpenedWine, info = ui.lastOpenedInfo;
  const n = state.tastings.filter(t=>sameWine(t, w)).length;
  sheetHTML(`
    ${openedHeadHTML(info)}
    <p style="font-size:13.5px;margin:2px 0 14px">${esc(w.name)}${w.vintage?' '+esc(w.vintage):''} is already in your journal (${n} note${n===1?'':'s'}) — no new entry was added.</p>
    <button class="settings-btn" onclick="viewNotesForLastOpened()">View journal notes</button>
    <button class="settings-btn" onclick="addNoteForLastOpened()">Add another note anyway</button>
  `);
}
function viewNotesForLastOpened(){
  const w = ui.lastOpenedWine; if(!w) return;
  closeSheet();
  ui.tFilterWine = { name: w.name, vintage: w.vintage||'' };
  ui.tSearch = '';
  ui.tab = 'tastings'; render(); armBack();
}
function addNoteForLastOpened(){
  if(ui.lastOpenedWine) openTastingForm(null, ui.lastOpenedWine, ui.lastOpenedInfo);
}
function undoOpen(){
  const info = ui.lastOpenedInfo;
  if(!info){ closeSheet(); return; }
  const w = state.wines.find(x=>x.id===info.wineId);
  if(w) w.qty = (+w.qty||0) + 1;
  else if(ui.lastOpenedWine && ui.lastOpenedWine.id===info.wineId){
    ui.lastOpenedWine.qty = 1;
    state.wines.push(ui.lastOpenedWine);                       // resurrect a removed last bottle
  }
  state.consumed = state.consumed.filter(c=>c.id!==info.consumedId);
  ui.lastOpenedInfo = null;
  save(); closeSheet(); render();
}
const fmtMonth = d => { const dt = new Date(d+'T00:00'); return isNaN(dt)? '' : dt.toLocaleDateString('en-ZA',{month:'short',year:'numeric'}); };
let rT; function debouncedRender(){ clearTimeout(rT); rT=setTimeout(render,220); }

/* ================= tastings view ================= */
function viewTastings(){
  const q = (ui.tSearch||'').toLowerCase();
  let list = state.tastings.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  if(ui.tFilterWine) list = list.filter(t=>sameWine(t, ui.tFilterWine));
  if(q) list = list.filter(t=>[t.name,t.producer,t.vintage,t.varietal,t.region,t.country,t.notes,(t.aromas||[]).join(' ')].join(' ').toLowerCase().includes(q));
  const fw = ui.tFilterWine;

    ${fw?`<div style="margin:-2px 2px 10px"><button class="mini-btn" onclick="clearTastingFilter()">Showing ${esc(fw.name)}${fw.vintage?' '+esc(fw.vintage):''} &nbsp;✕</button></div>`:''}
    <div class="section-head"><span class="eyebrow">Tasting journal</span><span class="count">${list.length} entr${list.length===1?'y':'ies'}</span></div>`;
  if(!state.tastings.length) return html + emptyState('✎','No tastings recorded yet.<br>Open a bottle, or add a note for a wine tasted elsewhere.','Add a tasting','openTastingForm()');
  if(!list.length) return html + emptyState('✎','No tastings match this search.');
  return html + list.map(t=>`
    <div class="card tasting-card">
      <div class="card-body">
        ${t.photo?`<img class="thumb" src="${t.photo}" onclick="lightbox('${t.id}','tastings')" alt="Label">`:''}
        <div>
          <div class="wine-name" style="font-size:18px">${esc(t.name)}${t.vintage?' <span style="color:var(--muted);font-weight:500">'+esc(t.vintage)+'</span>':''}</div>
          ${(t.producer||t.varietal||t.region)?`<div class="wine-sub">${t.type?`<span class="type-dot t-${t.type}"></span>`:''}${[t.producer,t.varietal,t.region,t.country].filter(Boolean).map(esc).join(' · ')}</div>`:''}
          <div class="tasting-date">${fmtDate(t.date)}</div>
        </div>
        ${+t.rating>0?`<div class="score-badge ochre"><b>${t.rating}</b><span>pts</span></div>`:''}
      </div>
      ${t.notes?`<div class="tasting-notes">${esc(t.notes)}</div>`:''}
      ${satSummary(t)}
      ${t.aromas && t.aromas.length ? `<div class="sat-summary"><b>Aromas</b> · ${t.aromas.map(esc).join(' · ')}</div>` : ''}
      <div class="card-actions">
        <button class="chip-btn" onclick="openTastingForm('${t.id}')">Edit</button>
        <button class="chip-btn" onclick="deleteTasting('${t.id}')">Delete</button>
      </div>
    </div>`).join('');
}
function fmtDate(d){
  if(!d) return '';
  const dt = new Date(d+'T00:00');
  return dt.toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'});
}
function deleteTasting(id){
  if(!confirm('Delete this tasting note?')) return;
  state.tastings = state.tastings.filter(t=>t.id!==id); save(); render();
}
function lightbox(id, coll){
  const rec = state[coll].find(x=>x.id===id);
  if(!rec?.photo) return;
  const root = document.getElementById('lightbox-root');
  root.innerHTML = `<div class="lightbox" onclick="this.remove();maybeDisarm()"><img src="${rec.photo}" alt="Label photo"></div>`;
  armBack();
}

/* ================= alerts view ================= */
function viewAlerts(){
  const a = alertWines();
  let html = `<div class="section-head"><span class="eyebrow">Drinking windows</span><span class="count">${YEAR}</span></div>`;
  if(!a.past.length && !a.soon.length)
    return html + emptyState('⌛','Nothing needs attention.<br>Every bottle is resting comfortably.');
  if(a.soon.length) html += group('Drink soon — window closes within a year', a.soon);
  if(a.past.length) html += group('Past window — open these first', a.past);
  return html;
  function group(title,items){
    return `<div class="alert-group">
      <div class="alert-band"><span class="eyebrow">${title}</span><span class="rule"></span></div>
      ${items.map(cardHTML).join('')}</div>`;
  }
}

/* ================= stats view ================= */
function viewStats(){
  const wines = state.wines, tastings = state.tastings;
  const bottles = wines.reduce((s,w)=>s+(+w.qty||0),0);
  const value = wines.reduce((s,w)=>s+(+w.qty||0)*(+w.price||0),0);
  const scored = wines.filter(w=>+w.score>0);
  const avgScore = scored.length? Math.round(scored.reduce((s,w)=>s+ +w.score,0)/scored.length) : '—';
  const rated = tastings.filter(t=>+t.rating>0);
  const avgTasting = rated.length? Math.round(rated.reduce((s,t)=>s+ +t.rating,0)/rated.length) : '—';
  const yr = tastings.filter(t=>(t.date||'').startsWith(YEAR)).length;

  const byType={}; wines.forEach(w=>{ byType[w.type]=(byType[w.type]||0)+(+w.qty||0); });
  const maxT = Math.max(...Object.values(byType),1);
  const typeBars = TYPES.filter(t=>byType[t]).map(t=>
    `<div class="bar-row"><div class="bl">${t}</div><div class="bt"><div class="bf" style="width:${byType[t]/maxT*100}%"></div></div><div class="bv">${byType[t]}</div></div>`).join('');

  const byRegion={}; wines.forEach(w=>{ if(w.region) byRegion[w.region.trim()]=(byRegion[w.region.trim()]||0)+(+w.qty||0); });
  const regions = Object.entries(byRegion).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const topScored = scored.slice().sort((a,b)=>b.score-a.score)[0];
  const best = rated.slice().sort((a,b)=>b.rating-a.rating)[0];

  return `
    <div class="section-head"><span class="eyebrow">The cellar in numbers</span></div>
    <div class="stat-grid">
      <div class="stat-tile"><div class="v">${bottles}</div><div class="l">Bottles</div></div>
      <div class="stat-tile"><div class="v">${value?rand(value):'—'}</div><div class="l">Cellar value</div></div>
      <div class="stat-tile"><div class="v">${avgScore}</div><div class="l">Avg score</div></div>
      <div class="stat-tile"><div class="v">${avgTasting}</div><div class="l">Avg tasting</div></div>
    </div>
    ${typeBars?`<div class="panel-block"><h3>Bottles by type</h3>${typeBars}</div>`:''}
    ${maturityPanel()}
    ${regions.length?`<div class="panel-block"><h3>Top regions</h3>${regions.map(([r,n])=>
      `<div class="plain-row"><span>${esc(r)}</span><span>${n} btls</span></div>`).join('')}</div>`:''}
    ${consumptionPanel()}
    <div class="panel-block"><h3>Highlights</h3>
      ${topScored?`<div class="plain-row"><span>Highest scored bottle</span><span>${esc(topScored.name)} · ${topScored.score} pts</span></div>`:''}
      ${best?`<div class="plain-row"><span>Best tasting</span><span>${esc(best.name)} · ${best.rating} pts</span></div>`:''}
      <div class="plain-row"><span>Journal entries</span><span>${tastings.length}</span></div>
      <div class="plain-row"><span>Tasted in ${YEAR}</span><span>${yr}</span></div>
    </div>`;
}

function maturityPanel(){
  const wines = state.wines.filter(w => (+w.qty||0) > 0 && (parseInt(w.drinkFrom) || parseInt(w.drinkTo)));
  if(!wines.length) return '';
  let maxTo = YEAR;
  wines.forEach(w => { const t = parseInt(w.drinkTo) || parseInt(w.drinkFrom); if(t > maxTo) maxTo = t; });
  const span = Math.min(maxTo, YEAR + 11);
  const counts = [];
  for(let y = YEAR; y <= span; y++){
    let n = 0;
    wines.forEach(w => {
      const f = parseInt(w.drinkFrom) || parseInt(w.drinkTo);
      const t = parseInt(w.drinkTo) || parseInt(w.drinkFrom);
      if(y >= f && y <= t) n += (+w.qty||0);
    });
    counts.push([y, n]);
  }
  const max = Math.max(...counts.map(c => c[1]), 1);
  const rows = counts.map(([y, n]) =>
    `<div class="bar-row"><div class="bl">${y}${y===YEAR?' ●':''}</div><div class="bt"><div class="bf" style="width:${n/max*100}%${y===YEAR?';background:var(--vine)':''}"></div></div><div class="bv">${n}</div></div>`).join('');
  const trunc = maxTo > span ? `<div style="font-size:11px;color:var(--muted);margin-top:4px">Windows extend to ${maxTo}</div>` : '';
  return `<div class="panel-block"><h3>Maturity timeline</h3>
    <div style="font-size:11.5px;color:var(--muted);margin:-6px 0 10px">Bottles in their drinking window, per year</div>
    ${rows}${trunc}</div>`;
}
function consumptionPanel(){
  const consumed = state.consumed||[];
  if(!consumed.length) return '';
  const byYear = {};
  consumed.forEach(c=>{ const y=(c.date||'').slice(0,4); if(y) byYear[y]=(byYear[y]||0)+1; });
  const years = Object.keys(byYear).sort();
  const maxY = Math.max(...Object.values(byYear),1);
  const bars = years.map(y=>
    `<div class="bar-row"><div class="bl">${y}</div><div class="bt"><div class="bf" style="width:${byYear[y]/maxY*100}%"></div></div><div class="bv">${byYear[y]}</div></div>`).join('');
  const thisYr = consumed.filter(c=>(c.date||'').startsWith(YEAR));
  const spentYr = thisYr.reduce((s,c)=>s+(+c.price||0),0);
  const spentAll = consumed.reduce((s,c)=>s+(+c.price||0),0);
  return `<div class="panel-block"><h3>Bottles opened</h3>
    ${bars}
    <div style="height:6px"></div>
    <div class="plain-row"><span>Opened in ${YEAR}</span><span>${thisYr.length} btls${spentYr?' · '+rand(spentYr):''}</span></div>
    <div class="plain-row"><span>All time</span><span>${consumed.length} btls${spentAll?' · '+rand(spentAll):''}</span></div>
    <div style="height:10px"></div>
    <button class="mini-btn quiet" onclick="openConsumptionLog()">View &amp; edit log</button>
  </div>`;
}
function openConsumptionLog(){
  const list = (state.consumed||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const rows = list.length? list.map(c=>`
    <div class="log-row">
      <div class="log-main"><b>${esc(c.name)}</b>${c.vintage?' '+esc(c.vintage):''}
        <div class="log-sub">${fmtDate(c.date)}${+c.price>0?' · '+rand(c.price):''}</div>
      </div>
      <button class="log-del" onclick="deleteConsumed('${c.id}')" aria-label="Delete entry">✕</button>
    </div>`).join('') : '<p style="color:var(--muted);font-size:13px">No bottles logged yet.</p>';
  sheetHTML(`<h2>Bottles opened</h2>
    <p style="font-size:12.5px;color:var(--muted);margin:-6px 0 12px">Opened one by mistake? Delete the entry here — and tap +1 on the bottle to restore its stock.</p>
    ${rows}`);
}
function deleteConsumed(id){
  if(!confirm('Remove this entry from the log?')) return;
  state.consumed = state.consumed.filter(c=>c.id!==id);
  save(); render(); openConsumptionLog();
}

/* ================= photos & label scanning ================= */
function compressImage(file, maxDim=1100, q=.72){
  return new Promise(res=>{
    const img = new Image();
    img.onload = () => {
      const r = Math.min(1, maxDim/Math.max(img.width,img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*r); c.height = Math.round(img.height*r);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(img.src);
      res(c.toDataURL('image/jpeg', q));
    };
    img.src = URL.createObjectURL(file);
  });
}

/* ---- on-device OCR (Tesseract.js) ---- */
function loadTesseract(){
  if(window.Tesseract) return Promise.resolve();
  return new Promise((res,rej)=>{
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@4.1.4/dist/tesseract.min.js';
    s.onload = res; s.onerror = () => rej(new Error('download failed'));
    document.head.appendChild(s);
  });
}
const OCR_JUNK = /(\b\d{2,4}\s?m?l\b)|(\b\d{2}\s?cl\b)|alc(ohol)?\b|% ?vol|\bvol\.?$|product of|produce of|wine of|estate bottled|contains sul|sulphit|sulfit/i;
function showLineChips(texts){
  const box = document.getElementById('ocr-chips');
  if(!box || !texts.length) return;
  const chips = texts.slice(0,7).map(t =>
    `<button class="mini-btn quiet" style="margin:0 6px 6px 0" onclick="useOcrLine(this)">${esc(t)}</button>`).join('');
  box.innerHTML = `<div style="margin-top:8px;font-size:11px;color:var(--muted);font-weight:600">Lines read from the label — tap one to use as the name:</div><div style="margin-top:6px">${chips}</div>`;
}
function fillVintageFrom(text){
  const vint = (text.match(/\b(19[5-9]\d|20[0-4]\d)\b/)||[])[0];
  if(vint){
    const vEl = document.getElementById('f-vintage') || document.getElementById('t-vintage');
    if(vEl && !vEl.value) vEl.value = vint;
  }
  return vint;
}
function finishLabelRead(cands, fullText, doneMsg){
  const vint = fillVintageFrom(fullText);
  const named = cands.filter(l => !OCR_JUNK.test(l.text));
  if(!named.length){
    setScanStatus('No readable text found — stylised labels are hard for OCR. Try a straighter, closer, well-lit shot.', true);
    return;
  }
  named.sort((a,b)=> b.h - a.h);
  const nameEl = document.getElementById('f-name') || document.getElementById('t-name');
  if(nameEl && !nameEl.value) nameEl.value = named[0].text;
  showLineChips(named.map(l=>l.text));
  setScanStatus(doneMsg + (vint ? ' Name and vintage filled in — tap a line to correct.' : ' Tap a line below to correct the name.'));
}
function preprocessForOCR(src){
  return new Promise(res=>{
    const img = new Image();
    img.onload = ()=>{
      const scale = Math.min(2, 1800/Math.max(img.width,img.height));
      const c = document.createElement('canvas');
      c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, c.width, c.height);
      const im = ctx.getImageData(0, 0, c.width, c.height), d = im.data;
      const hist = new Uint32Array(256);
      for(let i=0;i<d.length;i+=4){
        const g = (0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2])|0;
        d[i] = g; hist[g]++;
      }
      const cut = (d.length/4)*0.01;                 // clip 1% outliers, stretch the rest
      let lo=0, hi=255, acc=0;
      for(let v=0;v<256;v++){ acc+=hist[v]; if(acc>cut){ lo=v; break; } }
      acc=0;
      for(let v=255;v>=0;v--){ acc+=hist[v]; if(acc>cut){ hi=v; break; } }
      const range = Math.max(1, hi-lo);
      for(let i=0;i<d.length;i+=4){
        let g = (d[i]-lo)*255/range; g = g<0?0:g>255?255:g;
        d[i]=d[i+1]=d[i+2]=g;
      }
      ctx.putImageData(im, 0, 0);
      res(c.toDataURL('image/png'));
    };
    img.src = src;
  });
}
let ocrWorkerP = null;
function getOcrWorker(){
  if(!ocrWorkerP){
    ocrWorkerP = (async () => {
      const w = await Tesseract.createWorker();      // v4 API: options object, not a language
      await w.loadLanguage('eng');
      await w.initialize('eng');
      return w;
    })();
    ocrWorkerP.catch(() => { ocrWorkerP = null; });  // a failed download must not poison retries
  }
  return ocrWorkerP;
}
async function runOCR(){
  const src = ui.photoOCR || ui.photo;
  if(!src) return;
  setScanStatus('Loading text reader — first use downloads a few MB…');
  try{ await loadTesseract(); }
  catch(e){ setScanStatus('Could not load the OCR library. Check your connection and try again.', true); return; }
  try{
    setScanStatus('Preparing the photo…');
    const prepped = await preprocessForOCR(src);
    setScanStatus('Loading the language model — first use downloads a few MB…');
    const worker = await getOcrWorker();
    const cands = [], seen = new Set();
    let fullText = '', passErr = null;
    for(const psm of ['3','11']){                    // auto layout, then sparse-text sweep
      setScanStatus('Reading the label — pass '+(psm==='3'?'1':'2')+' of 2…');
      try{
        await worker.setParameters({ tessedit_pageseg_mode: psm });
        const { data } = await worker.recognize(prepped);
        fullText += '\n' + (data.text || '');
        for(const l of (data.lines || [])){
          const text = String(l.text||'').replace(/\s+/g,' ').trim();
          if(!text || (l.confidence ?? 0) <= 40 || !/[A-Za-z]{3}/.test(text)) continue;
          const key = text.toLowerCase();
          if(seen.has(key)) continue;
          seen.add(key);
          cands.push({ text, h: l.bbox ? (l.bbox.y1 - l.bbox.y0) : 0 });
        }
      }catch(pe){ passErr = pe; }                    // one bad pass shouldn't sink the other
    }
    if(!cands.length && passErr) throw passErr;
    finishLabelRead(cands, fullText, 'Done.');
  }catch(e){
    const msg = (e && e.message) ? e.message : (typeof e === 'string' && e ? e : 'engine error');
    setScanStatus('OCR failed ('+msg+'). Check your signal and tap Read label to retry, or fill in by hand.', true);
  }
}

  const el = document.getElementById('f-name') || document.getElementById('t-name');
  if(el) el.value = btn.textContent;
}

const SAT_COLOURS = {
  White:['lemon-green','lemon','gold','amber','brown'],
  Sparkling:['lemon-green','lemon','gold','amber'],
  'Rosé':['pink','salmon','orange'],
  Red:['purple','ruby','garnet','tawny','brown'],
  Dessert:['lemon','gold','amber','brown'],
  Fortified:['gold','amber','tawny','brown']
};
const SAT_SCALE5 = ['light','M-','M','M+','pronounced'];
function satRow(key, label, opts){
  return `<div class="sat-row"><div class="sat-label">${label}</div><div class="sat-opts">`+
    opts.map(o=>`<button type="button" class="sat-pill ${ui.sat[key]===o?'on':''}" onclick="satPick('${key}','${o}',this)">${o}</button>`).join('')+
    `</div></div>`;
}
function satPick(key, val, btn){
  if(ui.sat[key] === val){ delete ui.sat[key]; btn.classList.remove('on'); return; }
  ui.sat[key] = val;
  btn.parentElement.querySelectorAll('.sat-pill').forEach(b=>b.classList.toggle('on', b===btn));
}
function satBodyHTML(){
  const type = document.getElementById('t-type') ? document.getElementById('t-type').value : 'Red';
  return `
    <div class="sat-h">Appearance</div>
    ${satRow('appIntensity','Intensity',['pale','medium','deep'])}
    ${satRow('colour','Colour', SAT_COLOURS[type] || SAT_COLOURS.Red)}
    <div class="sat-h">Nose</div>
    ${satRow('noseIntensity','Intensity', SAT_SCALE5)}
    ${satRow('development','Development',['youthful','developing','fully developed','tired'])}
    <div class="sat-h">Palate</div>
    ${satRow('sweetness','Sweetness',['dry','off-dry','M-dry','M-sweet','sweet','luscious'])}
    ${satRow('acidity','Acidity',['low','M-','M','M+','high'])}
    ${satRow('tannin','Tannin',['low','M-','M','M+','high'])}
    ${satRow('alcohol','Alcohol',['low','medium','high'])}
    ${satRow('body','Body',['light','M-','M','M+','full'])}
    ${type==='Sparkling' ? satRow('mousse','Mousse',['delicate','creamy','aggressive']) : ''}
    ${satRow('flavourIntensity','Flavour intensity', SAT_SCALE5)}
    ${satRow('finish','Finish',['short','M-','M','M+','long'])}
    <div class="sat-h">Conclusions</div>
    ${satRow('quality','Quality',['poor','acceptable','good','very good','outstanding'])}
    ${satRow('readiness','Readiness',['too young','drink now: can age','at peak','past its best'])}`;
}
function refreshSat(){
  const type = document.getElementById('t-type').value;
  const colours = SAT_COLOURS[type] || [];
  if(ui.sat.colour && !colours.includes(ui.sat.colour)) delete ui.sat.colour;
  if(type !== 'Sparkling') delete ui.sat.mousse;
  const el = document.getElementById('sat-body');
  if(el) el.innerHTML = satBodyHTML();
}
function satSummary(t){
  const s = t.sat; if(!s) return '';
  const parts = [];
  if(s.appIntensity || s.colour) parts.push([s.appIntensity, s.colour].filter(Boolean).join(' '));
  if(s.noseIntensity) parts.push('Nose '+s.noseIntensity);
  if(s.development) parts.push(s.development);
  const L = { sweetness:'', acidity:'Acidity ', tannin:'Tannin ', alcohol:'Alcohol ', body:'Body ',
              mousse:'Mousse ', flavourIntensity:'Flavour ', finish:'Finish ' };
  Object.keys(L).forEach(k => { if(s[k]) parts.push(L[k]+s[k]); });
  if(!parts.length && !s.quality && !s.readiness) return '';
  const tail = [];
  if(s.quality) tail.push('<b>'+esc(s.quality)+'</b>');
  if(s.readiness) tail.push(esc(s.readiness));
  return `<div class="sat-summary">${parts.map(esc).concat(tail).join(' · ')}</div>`;
}

function backupAgeText(){
  if(!state.lastBackup) return {msg:'No backup made yet — make one once your cellar is loaded.', warn:(state.wines.length>0)};
  const days = Math.floor((Date.now()-state.lastBackup)/86400000);
  const msg = days===0? 'Last backup: today.' : days===1? 'Last backup: yesterday.' : 'Last backup: '+days+' days ago.';
  return {msg, warn: days>30};
}
function openSettings(){
  const b = backupAgeText();
  sheetHTML(`
    <h2>Settings</h2>
    <p style="font-size:12.5px;font-weight:600;margin:-6px 0 12px;color:${b.warn?'var(--ochre)':'var(--muted)'}">${b.msg}${b.warn?' Time for a fresh one.':''}</p>
    <button class="settings-btn" onclick="exportPDF()">Export cellar as PDF<small>A printable inventory: every wine with vintage, region, bin, quantity, score, drink window and value.</small></button>
    <button class="settings-btn" onclick="exportTastingsPDF()">Export tasting journal as PDF<small>A printable chronological journal — every tasting with its score, structured summary, aromas and notes.</small></button>
    <button class="settings-btn" onclick="exportCSV()">Export cellar as CSV<small>Spreadsheet-ready — every bottle and field, for Excel or Power BI.</small></button>
    <button class="settings-btn" onclick="exportTastingsCSV()">Export tastings as CSV<small>Every journal entry with wine details, score, aromas, notes, and each structured-tasting dimension as its own column.</small></button>
    <button class="settings-btn" onclick="document.getElementById('csv-file').click()">Import cellar from CSV<small>Bulk-load bottles from a spreadsheet. Shows a preview before anything is added; existing wines (same name + vintage) get their quantities topped up.</small></button>
    <input type="file" id="csv-file" accept=".csv,text/csv" style="display:none" onchange="csvPicked(this)">
    <button class="settings-btn" onclick="shareBackup()">Share backup<small>Sends the backup to Google Drive, email or WhatsApp via the share sheet (as a .txt file — restore accepts it as-is).</small></button>
    <button class="settings-btn" onclick="exportData()">Export backup<small>Download everything (incl. photos) as a JSON file — keep a copy in your cloud drive.</small></button>
    <button class="settings-btn" onclick="document.getElementById('import-file').click()">Restore from backup<small>Load a previously exported JSON file. Replaces current data.</small></button>
    <input type="file" id="import-file" accept=".json,.txt,application/json,text/plain" style="display:none" onchange="importData(this)">
    <button class="danger-link" onclick="wipeData()">Erase all data</button>
  `);
}
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cellarbook-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  state.lastBackup = Date.now(); save();
}
async function shareBackup(){
  // Android only allows sharing whitelisted file types — .json is not one of
  // them, so the backup travels as plain text (.txt). Restore reads it fine.
  const name = 'cellarbook-backup-'+new Date().toISOString().slice(0,10)+'.txt';
  const file = new File([JSON.stringify(state,null,2)], name, {type:'text/plain'});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{
      await navigator.share({ files:[file], title:'Cellar Book backup' });
      state.lastBackup = Date.now(); save();
    }catch(e){ /* user closed the share sheet — nothing to do */ }
  }else{
    exportData();
    alert("Sharing isn't available in this browser, so the backup was downloaded instead — upload the file to Drive from your Files app.");
  }
}

/* ---- PDF export ---- */
function loadScript(src){
  return new Promise((res,rej)=>{
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = () => rej(new Error('download failed'));
    document.head.appendChild(s);
  });
}
async function exportPDF(){
  if(!state.wines.length){ alert('The cellar is empty — nothing to export yet.'); return; }
  try{
    if(!window.jspdf) await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js');
  }catch(e){ alert('Could not load the PDF library — an internet connection is needed the first time.'); return; }

  const { jsPDF } = window.jspdf;
  const randPdf = n => ('R '+Number(n).toLocaleString('en-ZA',{maximumFractionDigits:0})).replace(/[\u00A0\u202F]/g,' ');
  const doc = new jsPDF({ unit:'pt', format:'a4' });          // portrait wine list
  const W = doc.internal.pageSize.getWidth();
  const H = doc.internal.pageSize.getHeight();
  const M = 60;
  const WINE=[110,30,43], INK=[43,38,35], MUT=[130,122,112], LINE=[216,208,190];
  const today = new Date().toLocaleDateString('en-ZA',{day:'numeric',month:'long',year:'numeric'});
  let y = 0;

  function pageHead(){
    y = 68;
    doc.setFont('times','bold'); doc.setFontSize(26); doc.setTextColor(...WINE);
    doc.text('Cellar Book', W/2, y, {align:'center'});
    y += 17;
    doc.setFont('times','italic'); doc.setFontSize(11); doc.setTextColor(...MUT);
    doc.text('Wine list \u00B7 '+today, W/2, y, {align:'center'});
    y += 12;
    doc.setDrawColor(...WINE); doc.setLineWidth(1);
    doc.line(M, y, W-M, y);
    y += 32;
  }
  function ensure(hNeeded){
    if(y + hNeeded > H - 64){ doc.addPage(); y = 60; }
  }
  const fit = (s, maxW) => {
    if(doc.getTextWidth(s) <= maxW) return s;
    while(s.length > 3 && doc.getTextWidth(s+'\u2026') > maxW) s = s.slice(0,-1);
    return s+'\u2026';
  };

  pageHead();
  const ORDER = ['Sparkling','Ros\u00E9','White','Red','Dessert','Fortified'];
  const groups = ORDER
    .map(t => [t, state.wines.filter(w=>w.type===t)])
    .filter(([,list]) => list.length);
  const priceAsc = (a,b) => {
    const pa = +a.price||0, pb = +b.price||0;
    if(pa && pb) return (pa-pb) || (a.name||'').localeCompare(b.name||'');
    if(pa) return 1;                                   // unpriced wines lead their group
    if(pb) return -1;
    return (a.name||'').localeCompare(b.name||'');
  };

  for(const [type, list] of groups){
    ensure(56);
    doc.setFont('times','bold'); doc.setFontSize(13); doc.setTextColor(...WINE);
    doc.text(type.toUpperCase(), W/2, y, {align:'center', charSpace:2.5});
    y += 8;
    doc.setDrawColor(...LINE); doc.setLineWidth(0.6);
    doc.line(W/2-60, y, W/2+60, y);
    y += 22;

    // sub-group by grape variety, alphabetical, unspecified last
    const byVar = new Map();
    list.forEach(w => {
      const key = (w.varietal||'').trim().toLowerCase() || '~';
      if(!byVar.has(key)) byVar.set(key, { label: (w.varietal||'').trim() || 'Unspecified', wines: [] });
      byVar.get(key).wines.push(w);
    });
    const subs = [...byVar.entries()].sort((a,b) =>
      a[0]==='~' ? 1 : b[0]==='~' ? -1 : a[0].localeCompare(b[0]));
    const showSub = !(subs.length === 1 && subs[0][0] === '~');

    for(const [, sub] of subs){
      sub.wines.sort(priceAsc);                        // least → most expensive
      if(showSub){
        ensure(58);
        doc.setFont('times','bolditalic'); doc.setFontSize(10.5); doc.setTextColor(...INK);
        doc.text(sub.label, M, y);
        y += 16;
      }
      for(const w of sub.wines){
      ensure(36);
      const price = +w.price>0 ? randPdf(w.price) : '';
      doc.setFont('times','bold'); doc.setFontSize(11.5); doc.setTextColor(...INK);
      let nmRaw = (w.vintage? w.vintage+'   ':'')+(w.name||'');
      if(w.format && w.format !== '750ml') nmRaw += '  \u2014  '+w.format;
      const nm = fit(nmRaw, W-2*M-90);
      doc.text(nm, M, y);
      if(price){
        doc.setFont('times','normal');
        doc.text(price, W-M, y, {align:'right'});
      }
      y += 13;
      const bits = [];
      const prod = String(w.producer||'').trim();
      if(prod && !(w.name||'').toLowerCase().includes(prod.toLowerCase())) bits.push(prod);
      if(w.region) bits.push(w.region);
      if(w.country) bits.push(w.country);
      if(w.location) bits.push(w.location);
      bits.push('\u00D7 '+(w.qty||0));
      if(+w.score>0) bits.push(w.score+' pts');
      if(w.drinkFrom||w.drinkTo) bits.push('drink '+[w.drinkFrom,w.drinkTo].filter(Boolean).join('\u2013'));
      doc.setFont('times','italic'); doc.setFontSize(9); doc.setTextColor(...MUT);
      doc.text(fit(bits.join('  \u00B7  '), W-2*M), M, y);
      y += 19;
      }
      y += 4;
    }
    y += 8;
  }

  ensure(40);
  const bottles = state.wines.reduce((s,w)=>s+(+w.qty||0),0);
  const totalVal = state.wines.reduce((s,w)=>s+(+w.qty||0)*(+w.price||0),0);
  doc.setDrawColor(...LINE); doc.setLineWidth(0.6);
  doc.line(M, y, W-M, y);
  y += 18;
  doc.setFont('times','normal'); doc.setFontSize(10); doc.setTextColor(...MUT);
  doc.text(bottles+' bottles in the cellar'+(totalVal? ' \u00B7 '+randPdf(totalVal):''), W/2, y, {align:'center'});
  doc.setFontSize(8);
  doc.text('Generated by Cellar Book', W/2, H-30, {align:'center'});
  doc.save('cellarbook-winelist-'+new Date().toISOString().slice(0,10)+'.pdf');
}
/* ---- CSV import / export ---- */
function parseCSV(text){
  const rows = []; let row = [], field = '', inQ = false;
  text = String(text||'').replace(/^\uFEFF/, '');
  for(let i = 0; i < text.length; i++){
    const c = text[i];
    if(inQ){
      if(c === '"'){ if(text[i+1] === '"'){ field += '"'; i++; } else inQ = false; }
      else field += c;
    }else{
      if(c === '"') inQ = true;
      else if(c === ','){ row.push(field); field = ''; }
      else if(c === '\n' || c === '\r'){
        if(c === '\r' && text[i+1] === '\n') i++;
        row.push(field); field = '';
        if(row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
      }
      else field += c;
    }
  }
  if(field !== '' || row.length){ row.push(field); if(row.length > 1 || row[0] !== '') rows.push(row); }
  return rows;
}
function buildImportPlan(rows){
  if(!rows || rows.length < 2) return { error: 'No data rows found — the file needs a header row plus at least one wine.' };
  const headers = rows[0].map(x => String(x||'').toLowerCase().replace(/[^a-z]/g, ''));
  const H = {
    name:['name','wine','winename'], producer:['producer','winery','estate','brand'], vintage:['vintage','year'],
    type:['type','colour','color','category','style'], varietal:['varietal','blend','grape','grapes','cultivar','variety'],
    region:['region','area','appellation','origin'], country:['country','land','nation'], location:['bin','location','rack','position','slot'],
    qty:['qty','quantity','bottles','count','stock','units'], price:['price','priceperbottle','cost','unitprice','rbtl','pricebtl','pricer'],
    format:['format','size','bottlesize'], score:['score','rating','points','pts'],
    drinkFrom:['drinkfrom','from','windowfrom','start','drinkafter'], drinkTo:['drinkto','drinkby','to','windowto','end','until'],
    purchaseDate:['purchasedate','bought','datepurchased','purchased','dateofpurchase'], notes:['notes','comments','remarks','note']
  };
  const idx = {}, matched = [], ignored = [];
  headers.forEach((hh, i) => {
    const k = Object.keys(H).find(k => H[k].includes(hh));
    if(k !== undefined && idx[k] === undefined){ idx[k] = i; matched.push(rows[0][i]); }
    else ignored.push(rows[0][i]);
  });
  if(idx.name === undefined) return { error: 'Could not find a "Name" column. The header row needs at least a Name column — download the template to see the expected layout.' };
  const typeMap = s => { s = String(s||'').toLowerCase().replace(/\s/g, '');
    if(/spark|mcc|capclass|champ|bubbl/.test(s)) return 'Sparkling';
    if(/ros/.test(s)) return 'Rosé';
    if(/white|blanc/.test(s)) return 'White';
    if(/red|rouge/.test(s)) return 'Red';
    if(/dessert|sweet|noble|latehar/.test(s)) return 'Dessert';
    if(/fort|port|sherry|jerepi/.test(s)) return 'Fortified';
    return null; };
  const fmtMap = s => { s = String(s||'').toLowerCase();
    if(!s) return '750ml';
    if(s.includes('375')) return '375ml Half';
    if(s.includes('500')) return '500ml';
    if(/3\s*l|double/.test(s)) return '3L Double magnum';
    if(/1\.5|magnum/.test(s)) return '1.5L Magnum';
    return '750ml'; };
  const dateNorm = s => { s = String(s||'').trim(); if(!s) return '';
    let m = s.match(/^(\d{4})[\/\-.](\d{1,2})[\/\-.](\d{1,2})/);
    if(m) return m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0');
    m = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);
    if(m) return m[3]+'-'+m[2].padStart(2,'0')+'-'+m[1].padStart(2,'0');
    return ''; };
  const get = (r, k) => idx[k] === undefined ? '' : String(r[idx[k]] ?? '').trim();
  const adds = [], updates = []; let skipped = 0, badType = 0;
  for(let i = 1; i < rows.length; i++){
    const r = rows[i];
    if(!r || r.every(c => String(c||'').trim() === '')) continue;
    const name = get(r, 'name');
    if(!name){ skipped++; continue; }
    const rawType = get(r, 'type');
    let type = typeMap(rawType);
    if(rawType && !type) badType++;
    if(!type) type = 'Red';
    const qraw = get(r, 'qty');
    const qty = qraw === '' ? 1 : Math.max(0, parseInt(qraw.replace(/[^\d]/g, '')) || 0);
    const scn = parseInt(get(r, 'score'));
    const w = {
      name, producer:get(r,'producer'),
      vintage: (v => /n\s*\.?\s*v/i.test(v) ? 'NV' : v.replace(/[^\d]/g,'').slice(0,4))(get(r,'vintage')),
      type, varietal:get(r,'varietal'), country:get(r,'country'), region:get(r,'region'), location:get(r,'location'),
      qty, price: parseFloat(get(r,'price').replace(/[^\d.]/g,'')) || '',
      format: fmtMap(get(r,'format')),
      score: scn > 0 ? Math.min(100, scn) : '',
      drinkFrom:get(r,'drinkFrom').replace(/[^\d]/g,'').slice(0,4),
      drinkTo:get(r,'drinkTo').replace(/[^\d]/g,'').slice(0,4),
      purchaseDate: dateNorm(get(r,'purchaseDate')), notes:get(r,'notes'), photo:null
    };
    const ex = state.wines.find(x => sameWine(x, w));
    if(ex) updates.push({ id: ex.id, w }); else adds.push(w);
  }
  return { adds, updates, skipped, badType, matched, ignored };
}
function processCsvText(text){
  ui.csvPlan = buildImportPlan(parseCSV(text));
  openCsvPreview();
}
function csvPicked(input){
  const f = input.files[0]; input.value = ''; if(!f) return;
  const r = new FileReader();
  r.onload = () => processCsvText(r.result);
  r.readAsText(f);
}
function openCsvPreview(){
  const p = ui.csvPlan;
  if(!p) return;
  if(p.error){
    sheetHTML(`<h2>Import cellar from CSV</h2>
      <p style="font-size:13.5px;color:var(--wine);font-weight:600;margin-bottom:14px">${esc(p.error)}</p>
      <button class="settings-btn" onclick="downloadCsvTemplate()">Download a template CSV<small>The headers the import understands, with an example row.</small></button>`);
    return;
  }
  const li = (label, val) => `<div class="plain-row"><span>${label}</span><span>${val}</span></div>`;
  sheetHTML(`<h2>Ready to import</h2>
    ${li('New wines to add', p.adds.length)}
    ${li('Existing wines to top up', p.updates.length)}
    ${p.skipped ? li('Rows skipped (no name)', p.skipped) : ''}
    ${p.badType ? li('Unrecognised type — set to Red', p.badType) : ''}
    <div style="font-size:11.5px;color:var(--muted);margin:10px 0 4px">Columns matched: ${p.matched.map(esc).join(', ') || 'none'}</div>
    ${p.ignored.length ? `<div style="font-size:11.5px;color:var(--muted);margin-bottom:10px">Ignored: ${p.ignored.map(esc).join(', ')}</div>` : '<div style="height:8px"></div>'}
    <button class="primary-btn" onclick="applyCsvImport()">Import now</button>
    <button class="danger-link" onclick="ui.csvPlan=null;closeSheet()">Cancel</button>
    <div style="text-align:center;margin-top:6px"><button class="mini-btn quiet" onclick="downloadCsvTemplate()">Download a template CSV</button></div>`);
}
function applyCsvImport(){
  const p = ui.csvPlan; if(!p || p.error) return;
  p.adds.forEach(w => state.wines.push({ id: uid(), created: Date.now(), ...w }));
  p.updates.forEach(u => {
    const ex = state.wines.find(x => x.id === u.id); if(!ex) return;
    ex.qty = (+ex.qty||0) + (+u.w.qty||0);
    ['producer','varietal','country','region','location','price','format','score','drinkFrom','drinkTo','purchaseDate','notes']
      .forEach(k => { if((ex[k] === '' || ex[k] == null) && u.w[k] !== '' && u.w[k] != null) ex[k] = u.w[k]; });
  });
  const msg = 'Added '+p.adds.length+' new wine'+(p.adds.length===1?'':'s')+', topped up '+p.updates.length+', skipped '+p.skipped+'.';
  ui.csvPlan = null;
  save(); render();
  sheetHTML(`<h2>Import complete</h2><p style="font-size:13.5px;margin-bottom:14px">${msg}</p>
    <button class="primary-btn" onclick="closeSheet()">Done</button>`);
}
const csvEsc = v => { v = String(v ?? ''); return /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v; };
function buildCSV(){
  const head = ['Name','Producer','Vintage','Type','Varietal','Region','Country','Bin','Qty','Price','Format','Score','Drink From','Drink To','Purchase Date','Notes'];
  const lines = [head.join(',')];
  state.wines.forEach(w => lines.push([w.name, w.producer, w.vintage, w.type, w.varietal, w.region, w.country||'', w.location,
    w.qty||0, w.price||'', w.format||'', w.score||'', w.drinkFrom||'', w.drinkTo||'', w.purchaseDate||'', w.notes||''
  ].map(csvEsc).join(',')));
  return '\uFEFF' + lines.join('\r\n');
}
function exportCSV(){
  if(!state.wines.length){ alert('The cellar is empty — nothing to export yet.'); return; }
  const blob = new Blob([buildCSV()], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cellarbook-cellar-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(a.href);
}
function downloadCsvTemplate(){
  const csv = '\uFEFFName,Producer,Vintage,Type,Varietal,Region,Country,Bin,Qty,Price,Format,Score,Drink From,Drink To,Purchase Date,Notes\r\n' +
    'Kanonkop Paul Sauer,Kanonkop,2019,Red,Bordeaux blend,Stellenbosch,South Africa,Rack A,3,650,750ml,95,2025,2040,10/03/2024,Birthday wine\r\n' +
    'Graham Beck Brut,Graham Beck,NV,Sparkling,MCC,Robertson,South Africa,S1,6,240,750ml,,2026,2029,,\r\n';
  const blob = new Blob([csv], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cellarbook-template.csv';
  a.click(); URL.revokeObjectURL(a.href);
}
/* ---- tasting journal exports ---- */
function satPlain(t){
  const s = t.sat; if(!s) return '';
  const parts = [];
  if(s.appIntensity || s.colour) parts.push([s.appIntensity, s.colour].filter(Boolean).join(' '));
  if(s.noseIntensity) parts.push('Nose '+s.noseIntensity);
  if(s.development) parts.push(s.development);
  const L = { sweetness:'', acidity:'Acidity ', tannin:'Tannin ', alcohol:'Alcohol ', body:'Body ',
              mousse:'Mousse ', flavourIntensity:'Flavour ', finish:'Finish ' };
  Object.keys(L).forEach(k => { if(s[k]) parts.push(L[k]+s[k]); });
  if(s.quality) parts.push('Quality: '+s.quality);
  if(s.readiness) parts.push(s.readiness);
  return parts.join(' \u00B7 ');
}
const SAT_COLS = [['appIntensity','Appearance intensity'],['colour','Colour'],['noseIntensity','Nose intensity'],
  ['development','Development'],['sweetness','Sweetness'],['acidity','Acidity'],['tannin','Tannin'],
  ['alcohol','Alcohol'],['body','Body'],['mousse','Mousse'],['flavourIntensity','Flavour intensity'],
  ['finish','Finish'],['quality','Quality'],['readiness','Readiness']];
function buildTastingsCSV(){
  const head = ['Date','Wine','Producer','Vintage','Type','Varietal','Region','Country','Score','Aromas','Notes',
                ...SAT_COLS.map(c=>c[1])];
  const lines = [head.join(',')];
  state.tastings.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||'')).forEach(t => {
    const s = t.sat || {};
    lines.push([t.date||'', t.name, t.producer||'', t.vintage||'', t.type||'', t.varietal||'',
      t.region||'', t.country||'', (+t.rating>0? t.rating:''), (t.aromas||[]).join('; '), t.notes||'',
      ...SAT_COLS.map(c => s[c[0]]||'')].map(csvEsc).join(','));
  });
  return '\uFEFF'+lines.join('\r\n');
}
function exportTastingsCSV(){
  if(!state.tastings.length){ alert('The journal is empty — nothing to export yet.'); return; }
  const blob = new Blob([buildTastingsCSV()], { type:'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'cellarbook-tastings-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click(); URL.revokeObjectURL(a.href);
}

  doc.setDrawColor(...WINE); doc.setLineWidth(1); doc.line(M, y, W-M, y); y += 30;
  const ensure = hN => { if(y + hN > H - 64){ doc.addPage(); y = 60; } };
  const fit = (s, maxW) => {
    if(doc.getTextWidth(s) <= maxW) return s;
    while(s.length > 3 && doc.getTextWidth(s+'\u2026') > maxW) s = s.slice(0,-1);
    return s+'\u2026';
  };
  const list = state.tastings.slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  for(const t of list){
    ensure(58);
    doc.setFont('times','bold'); doc.setFontSize(12.5); doc.setTextColor(...INK);
    doc.text(fit((t.name||'')+(t.vintage? '  '+t.vintage:''), W-2*M-64), M, y);
    if(+t.rating > 0){
      doc.setFont('times','bold'); doc.setTextColor(...WINE);
      doc.text(t.rating+' pts', W-M, y, {align:'right'});
    }
    y += 14;
    const meta = [fmtDate(t.date), t.producer, t.varietal, t.region, t.country].filter(Boolean).join('  \u00B7  ');
    if(meta){
      doc.setFont('times','italic'); doc.setFontSize(9); doc.setTextColor(...MUT);
      doc.text(fit(meta, W-2*M), M, y); y += 13;
    }
    const sp = satPlain(t);
    if(sp){
      doc.setFont('times','italic'); doc.setFontSize(9); doc.setTextColor(96,86,76);
      for(const line of doc.splitTextToSize(sp, W-2*M)){ ensure(13); doc.text(line, M, y); y += 11.5; }
      y += 1;
    }
    if(t.aromas && t.aromas.length){
      doc.setFont('times','italic'); doc.setFontSize(9); doc.setTextColor(...MUT);
      for(const line of doc.splitTextToSize('Aromas: '+t.aromas.join(', '), W-2*M)){ ensure(13); doc.text(line, M, y); y += 11.5; }
      y += 1;
    }
    if(t.notes){
      doc.setFont('times','normal'); doc.setFontSize(10); doc.setTextColor(...INK);
      for(const line of doc.splitTextToSize(t.notes, W-2*M)){ ensure(14); doc.text(line, M, y); y += 12.5; }
    }
    y += 6; ensure(12);
    doc.setDrawColor(...LINE); doc.setLineWidth(0.6);
    doc.line(M, y, W-M, y); y += 18;
  }
  ensure(24);
  doc.setFont('times','normal'); doc.setFontSize(10); doc.setTextColor(...MUT);
  doc.text(list.length+' tasting'+(list.length===1?'':'s')+' recorded', W/2, y, {align:'center'});
  doc.setFontSize(8);
  doc.text('Generated by Cellar Book', W/2, H-30, {align:'center'});
  doc.save('cellarbook-journal-'+new Date().toISOString().slice(0,10)+'.pdf');
}
function importData(input){
  const file = input.files[0]; if(!file) return;
  const r = new FileReader();
  r.onload = () => {
    try{
      const data = JSON.parse(r.result);
      if(!Array.isArray(data.wines) || !Array.isArray(data.tastings)) throw 0;
      state = data; migrate(); save(); closeSheet(); render();
    }catch(e){ alert('That file is not a valid Cellar Book backup.'); }
  };
  r.readAsText(file);
}
function wipeData(){
  if(!confirm('Erase every bottle and tasting note? This cannot be undone.')) return;
  state = { wines:[], tastings:[] }; save(); closeSheet(); render();
}

/* ================= sheet plumbing ================= */
function sheetHTML(inner){
  const s = document.getElementById('sheet');
  s.innerHTML = '<div class="sheet-handle"></div>'+inner;
  s.scrollTop = 0;
  document.getElementById('backdrop').classList.add('open');
  requestAnimationFrame(()=>s.classList.add('open'));
  armBack();
}
function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
  maybeDisarm();
}
function emptyState(glyph,msg,btnLabel,btnFn){
  return `<div class="empty"><div class="glyph">${glyph}</div><p>${msg}</p>
    ${btnLabel?`<button class="chip-btn wine" onclick="${btnFn}">${btnLabel}</button>`:''}</div>`;
}

/* ================= fast-scroll handle ================= */
const fsEl = () => document.getElementById('fastscroll');
const fsMain = () => document.getElementById('main');
let fsTimer = null, fsDragging = false, fsThumbH = 48;
function fsUpdate(){
  const m = fsMain(), fs = fsEl();
  if(!m || !fs) return;
  const ratio = m.scrollHeight ? (m.clientHeight / m.scrollHeight) : 1;
  if(!m.scrollHeight || ratio >= 0.6){ fs.classList.add('hidden'); return; }   // short pages need no handle
  fs.classList.remove('hidden');
  const track = fs.clientHeight;
  fsThumbH = Math.max(48, Math.round(track * ratio));
  const maxScroll = m.scrollHeight - m.clientHeight;
  const pos = maxScroll ? (m.scrollTop / maxScroll) * (track - fsThumbH) : 0;
  const th = document.getElementById('fsthumb');
  th.style.height = fsThumbH + 'px';
  th.style.transform = 'translateY(' + Math.round(pos) + 'px)';
  fsShow();
}
function fsShow(){
  const fs = fsEl();
  fs.classList.add('on');
  clearTimeout(fsTimer);
  if(!fsDragging) fsTimer = setTimeout(() => fs.classList.remove('on'), 1200);
}
function fsSeek(clientY){
  const m = fsMain(), fs = fsEl();
  const r = fs.getBoundingClientRect();
  const frac = Math.min(1, Math.max(0, (clientY - r.top - fsThumbH/2) / Math.max(1, r.height - fsThumbH)));
  m.scrollTop = frac * (m.scrollHeight - m.clientHeight);
}
function fsInit(){
  const fs = fsEl(), m = fsMain();
  m.addEventListener('scroll', fsUpdate, { passive: true });
  window.addEventListener('resize', fsUpdate);
  fs.addEventListener('pointerdown', e => {
    fsDragging = true; fs.classList.add('drag');
    try{ fs.setPointerCapture(e.pointerId); }catch(_){}
    fsSeek(e.clientY); e.preventDefault();
  });
  fs.addEventListener('pointermove', e => { if(fsDragging) fsSeek(e.clientY); });
  const end = () => { if(!fsDragging) return; fsDragging = false; fs.classList.remove('drag'); fsShow(); };
  fs.addEventListener('pointerup', end);
  fs.addEventListener('pointercancel', end);
}
fsInit();

/* ================= boot ================= */
boot();
if(navigator.storage && navigator.storage.persist) navigator.storage.persist();
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
